<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="880" viewBox="0 0 1180 880" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <style>
      .title  { font-size: 26px; font-weight: 700; fill: #1b3a2b; }
      .sub    { font-size: 13px; fill: #4a6357; }
      .comp   { fill: #ffffff; stroke: #2f4f4f; stroke-width: 2; rx: 8; }
      .esp    { fill: #2d3e50; stroke: #1b2733; stroke-width: 2; rx: 10; }
      .esplbl { fill: #ecf0f1; font-size: 15px; font-weight: 700; }
      .espsub { fill: #9fb4c7; font-size: 11px; }
      .ctitle { font-size: 14px; font-weight: 700; fill: #14342b; }
      .cdesc  { font-size: 11px; fill: #5a6b63; }
      .pin    { font-size: 11px; font-weight: 700; fill: #ecf0f1; }
      .pad    { fill: #f4c20d; stroke: #b8930a; stroke-width: 1; }
      .wlbl   { font-size: 10.5px; font-weight: 700; }
      .legbox { fill: #f7faf8; stroke: #cdddd4; stroke-width: 1; rx: 6; }
      .note   { font-size: 11.5px; fill: #5a6b63; }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="40" y="40" class="title">WasteGuard — Schéma de câblage (ESP32 mono-carte)</text>
  <text x="40" y="60" class="sub">Bac intelligent : carrousel stepper, 4 servos couvercle, RFID, 4× ultrason, IR présence, OLED, ESP32-CAM. Protocole série USB 9600 bauds vers l'app Qt.</text>

  <!-- ===================== ESP32 BOARD ===================== -->
  <rect x="470" y="230" width="240" height="430" class="esp"/>
  <text x="590" y="262" text-anchor="middle" class="esplbl">ESP32 DevKit v1</text>
  <text x="590" y="280" text-anchor="middle" class="espsub">3.3 V logique · USB → PC (série 9600)</text>

  <!-- Left-side pin pads -->
  <!-- y positions -->
  <g>
    <rect x="462" y="300" width="16" height="14" class="pad"/><text x="486" y="311" class="pin">G14</text>
    <rect x="462" y="326" width="16" height="14" class="pad"/><text x="486" y="337" class="pin">G27</text>
    <rect x="462" y="360" width="16" height="14" class="pad"/><text x="486" y="371" class="pin">G32</text>
    <rect x="462" y="392" width="16" height="14" class="pad"/><text x="486" y="403" class="pin">G33</text>
    <rect x="462" y="430" width="16" height="14" class="pad"/><text x="486" y="441" class="pin">G21</text>
    <rect x="462" y="456" width="16" height="14" class="pad"/><text x="486" y="467" class="pin">G22</text>
    <rect x="462" y="500" width="16" height="14" class="pad"/><text x="486" y="511" class="pin">G2</text>
    <rect x="462" y="540" width="16" height="14" class="pad"/><text x="498" y="551" class="pin">5V</text>
    <rect x="462" y="566" width="16" height="14" class="pad"/><text x="486" y="577" class="pin">GND</text>
  </g>
  <!-- Right-side pin pads -->
  <g>
    <rect x="702" y="300" width="16" height="14" class="pad"/><text x="694" y="311" text-anchor="end" class="pin">G15</text>
    <rect x="702" y="322" width="16" height="14" class="pad"/><text x="694" y="333" text-anchor="end" class="pin">G13</text>
    <rect x="702" y="344" width="16" height="14" class="pad"/><text x="694" y="355" text-anchor="end" class="pin">G12</text>
    <rect x="702" y="366" width="16" height="14" class="pad"/><text x="694" y="377" text-anchor="end" class="pin">G25</text>
    <rect x="702" y="402" width="16" height="14" class="pad"/><text x="694" y="413" text-anchor="end" class="pin">G5</text>
    <rect x="702" y="424" width="16" height="14" class="pad"/><text x="694" y="435" text-anchor="end" class="pin">G4</text>
    <rect x="702" y="446" width="16" height="14" class="pad"/><text x="694" y="457" text-anchor="end" class="pin">G18</text>
    <rect x="702" y="468" width="16" height="14" class="pad"/><text x="694" y="479" text-anchor="end" class="pin">G19</text>
    <rect x="702" y="490" width="16" height="14" class="pad"/><text x="694" y="501" text-anchor="end" class="pin">G23</text>
    <rect x="702" y="524" width="16" height="14" class="pad"/><text x="694" y="535" text-anchor="end" class="pin">G34</text>
    <rect x="702" y="546" width="16" height="14" class="pad"/><text x="694" y="557" text-anchor="end" class="pin">G35</text>
    <rect x="702" y="568" width="16" height="14" class="pad"/><text x="694" y="579" text-anchor="end" class="pin">G36</text>
    <rect x="702" y="590" width="16" height="14" class="pad"/><text x="694" y="601" text-anchor="end" class="pin">G39</text>
  </g>

  <!-- ===================== LEFT COMPONENTS ===================== -->
  <!-- Stepper driver + NEMA17 -->
  <rect x="60" y="285" width="190" height="60" class="comp"/>
  <text x="70" y="305" class="ctitle">A4988 / DRV8825</text>
  <text x="70" y="322" class="cdesc">Driver → moteur NEMA17</text>
  <text x="70" y="337" class="cdesc">Carrousel 4 bacs (50 pas = 90°)</text>

  <!-- Push button -->
  <rect x="60" y="350" width="190" height="40" class="comp"/>
  <text x="70" y="370" class="ctitle">Bouton poussoir</text>
  <text x="70" y="384" class="cdesc">Cycle (INPUT_PULLUP → GND)</text>

  <!-- IR sensor -->
  <rect x="60" y="394" width="190" height="40" class="comp"/>
  <text x="70" y="414" class="ctitle">Capteur IR obstacle</text>
  <text x="70" y="428" class="cdesc">Présence (LOW = détecté)</text>

  <!-- OLED -->
  <rect x="60" y="430" width="190" height="48" class="comp"/>
  <text x="70" y="450" class="ctitle">OLED SSD1306 128×32</text>
  <text x="70" y="464" class="cdesc">I2C — visage animé "Labib"</text>

  <!-- Ultrasonic TRIG note -->
  <rect x="60" y="492" width="190" height="40" class="comp"/>
  <text x="70" y="512" class="ctitle">HC-SR04 ×4 — TRIG commun</text>
  <text x="70" y="526" class="cdesc">1 broche TRIG partagée (G2)</text>

  <!-- Power -->
  <rect x="60" y="545" width="190" height="55" class="comp"/>
  <text x="70" y="565" class="ctitle">Alimentation 5V</text>
  <text x="70" y="580" class="cdesc">5V/GND ESP32 + servos + driver</text>
  <text x="70" y="594" class="cdesc">GND commun obligatoire</text>

  <!-- ===================== RIGHT COMPONENTS ===================== -->
  <!-- 4 Servos -->
  <rect x="930" y="288" width="190" height="92" class="comp"/>
  <text x="940" y="308" class="ctitle">4× Servo couvercle</text>
  <text x="940" y="324" class="cdesc">MG90S — ouverture synchrone</text>
  <text x="940" y="340" class="cdesc">Signal: G15 · G13 · G12 · G25</text>
  <text x="940" y="356" class="cdesc">0° fermé / 90° ouvert</text>
  <text x="940" y="372" class="cdesc">VCC 5V + GND communs</text>

  <!-- RFID -->
  <rect x="930" y="396" width="190" height="100" class="comp"/>
  <text x="940" y="416" class="ctitle">RFID MFRC522</text>
  <text x="940" y="432" class="cdesc">SS  → G5    RST → G4</text>
  <text x="940" y="448" class="cdesc">SCK → G18  MISO → G19</text>
  <text x="940" y="464" class="cdesc">MOSI → G23</text>
  <text x="940" y="480" class="cdesc">VCC 3.3V · GND</text>

  <!-- Ultrasonic echoes -->
  <rect x="930" y="512" width="190" height="100" class="comp"/>
  <text x="940" y="532" class="ctitle">4× HC-SR04 — ECHO</text>
  <text x="940" y="548" class="cdesc">Bac0 ECHO → G34</text>
  <text x="940" y="564" class="cdesc">Bac1 ECHO → G35</text>
  <text x="940" y="580" class="cdesc">Bac2 ECHO → G36</text>
  <text x="940" y="596" class="cdesc">Bac3 ECHO → G39</text>

  <!-- ===================== WIRES (left) ===================== -->
  <!-- STEP/DIR -->
  <path d="M250 312 L462 307" stroke="#e74c3c" stroke-width="2.2" fill="none" marker-end="url(#arr)"/>
  <text x="300" y="302" class="wlbl" fill="#c0392b">STEP/DIR G14·G27</text>
  <path d="M250 330 L462 332" stroke="#e74c3c" stroke-width="2.2" fill="none" marker-end="url(#arr)"/>
  <!-- button -->
  <path d="M250 370 L462 367" stroke="#16a085" stroke-width="2.2" fill="none" marker-end="url(#arr)"/>
  <text x="300" y="362" class="wlbl" fill="#0e6655">G32</text>
  <!-- IR -->
  <path d="M250 412 L462 399" stroke="#16a085" stroke-width="2.2" fill="none" marker-end="url(#arr)"/>
  <text x="300" y="394" class="wlbl" fill="#0e6655">G33</text>
  <!-- OLED SDA/SCL -->
  <path d="M250 450 L462 437" stroke="#2980b9" stroke-width="2.2" fill="none" marker-end="url(#arr)"/>
  <text x="300" y="446" class="wlbl" fill="#1f618d">SDA G21 · SCL G22</text>
  <path d="M250 462 L462 463" stroke="#2980b9" stroke-width="2.2" fill="none" marker-end="url(#arr)"/>
  <!-- TRIG -->
  <path d="M250 510 L462 507" stroke="#8e44ad" stroke-width="2.2" fill="none" marker-end="url(#arr)"/>
  <text x="300" y="502" class="wlbl" fill="#6c3483">TRIG G2</text>
  <!-- power 5V/GND -->
  <path d="M250 560 L462 547" stroke="#d35400" stroke-width="2.4" fill="none" marker-end="url(#arr)"/>
  <text x="300" y="544" class="wlbl" fill="#a04000">5V</text>
  <path d="M250 575 L462 573" stroke="#2c3e50" stroke-width="2.4" fill="none" marker-end="url(#arr)"/>
  <text x="300" y="592" class="wlbl" fill="#2c3e50">GND commun</text>

  <!-- ===================== WIRES (right) ===================== -->
  <!-- servos -->
  <path d="M718 307 L930 312" stroke="#27ae60" stroke-width="2.2" fill="none" marker-end="url(#arr)"/>
  <path d="M718 329 L930 326" stroke="#27ae60" stroke-width="2.2" fill="none"/>
  <path d="M718 351 L930 340" stroke="#27ae60" stroke-width="2.2" fill="none"/>
  <path d="M718 373 L930 354" stroke="#27ae60" stroke-width="2.2" fill="none"/>
  <text x="745" y="300" class="wlbl" fill="#1e8449">G15·G13·G12·G25</text>
  <!-- RFID -->
  <path d="M718 409 L930 420" stroke="#2980b9" stroke-width="2.2" fill="none" marker-end="url(#arr)"/>
  <path d="M718 431 L930 432" stroke="#2980b9" stroke-width="2.2" fill="none"/>
  <path d="M718 453 L930 444" stroke="#2980b9" stroke-width="2.2" fill="none"/>
  <path d="M718 475 L930 456" stroke="#2980b9" stroke-width="2.2" fill="none"/>
  <path d="M718 497 L930 468" stroke="#2980b9" stroke-width="2.2" fill="none"/>
  <text x="745" y="402" class="wlbl" fill="#1f618d">SPI G5·G4·G18·G19·G23</text>
  <!-- echoes -->
  <path d="M718 531 L930 540" stroke="#8e44ad" stroke-width="2.2" fill="none" marker-end="url(#arr)"/>
  <path d="M718 553 L930 558" stroke="#8e44ad" stroke-width="2.2" fill="none"/>
  <path d="M718 575 L930 576" stroke="#8e44ad" stroke-width="2.2" fill="none"/>
  <path d="M718 597 L930 592" stroke="#8e44ad" stroke-width="2.2" fill="none"/>
  <text x="745" y="524" class="wlbl" fill="#6c3483">ECHO G34·G35·G36·G39</text>

  <!-- ===================== ESP32-CAM (separate) ===================== -->
  <rect x="470" y="700" width="240" height="70" class="comp"/>
  <text x="480" y="722" class="ctitle">ESP32-CAM (OV2640)</text>
  <text x="480" y="738" class="cdesc">Module séparé — capture l'image du déchet.</text>
  <text x="480" y="753" class="cdesc">Streame vers le PC ; l'app Qt classe (YOLO)</text>
  <text x="480" y="766" class="cdesc">puis renvoie AI:&lt;MATIÈRE&gt; à l'ESP32.</text>
  <path d="M590 700 L590 660" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="5 4" fill="none" marker-end="url(#arr)"/>
  <text x="600" y="685" class="note">flux AI via PC</text>

  <!-- ===================== LEGEND ===================== -->
  <rect x="60" y="640" width="360" height="170" class="legbox"/>
  <text x="75" y="662" class="ctitle">Légende des liaisons</text>
  <g class="note">
    <rect x="75" y="672" width="22" height="6" fill="#e74c3c"/><text x="105" y="679">Stepper STEP/DIR (G14, G27)</text>
    <rect x="75" y="690" width="22" height="6" fill="#27ae60"/><text x="105" y="697">Servos PWM (G15, G13, G12, G25)</text>
    <rect x="75" y="708" width="22" height="6" fill="#2980b9"/><text x="105" y="715">SPI RFID + I2C OLED</text>
    <rect x="75" y="726" width="22" height="6" fill="#8e44ad"/><text x="105" y="733">Ultrason TRIG/ECHO (G2 + G34-39)</text>
    <rect x="75" y="744" width="22" height="6" fill="#16a085"/><text x="105" y="751">Entrées logiques (bouton G32, IR G33)</text>
    <rect x="75" y="762" width="22" height="6" fill="#d35400"/><text x="105" y="769">Alim 5V</text>
    <rect x="75" y="780" width="22" height="6" fill="#2c3e50"/><text x="105" y="787">GND commun (toutes masses reliées)</text>
  </g>

  <!-- Warnings -->
  <rect x="760" y="640" width="360" height="170" class="legbox"/>
  <text x="775" y="662" class="ctitle" fill="#b53030">/!\ Notes de câblage</text>
  <g class="note">
    <text x="775" y="684">• G34/35/36/39 sont en entrée seule : OK pour ECHO.</text>
    <text x="775" y="702">• Mettre un diviseur de tension sur ECHO si le</text>
    <text x="775" y="717">  HC-SR04 sort du 5V (ESP32 = 3.3V).</text>
    <text x="775" y="735">• Servos + stepper alimentés en 5V externe,</text>
    <text x="775" y="750">  PAS depuis le régulateur de l'ESP32.</text>
    <text x="775" y="768">• Toutes les masses (GND) doivent être communes.</text>
    <text x="775" y="786">• RFID alimenté en 3.3V (pas 5V).</text>
  </g>
</svg>
