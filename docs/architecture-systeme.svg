<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="880" viewBox="0 0 1260 880" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <style>
      .title  { font-size: 26px; font-weight: 700; fill: #1b3a2b; }
      .sub    { font-size: 13px; fill: #4a6357; }
      .comp   { fill: #ffffff; stroke: #2f4f4f; stroke-width: 2; }
      .core   { fill: #2d3e50; stroke: #1b2733; stroke-width: 2; }
      .corelbl{ fill: #ecf0f1; font-size: 19px; font-weight: 700; }
      .coresub{ fill: #9fb4c7; font-size: 12px; }
      .ctitle { font-size: 15px; font-weight: 700; fill: #14342b; }
      .cdesc  { font-size: 11.5px; fill: #5a6b63; }
      .wlbl   { font-size: 11px; font-weight: 700; }
      .legbox { fill: #f7faf8; stroke: #cdddd4; stroke-width: 1; }
      .note   { font-size: 11.5px; fill: #5a6b63; }
    </style>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrR" markerWidth="9" markerHeight="9" refX="0" refY="3" orient="auto">
      <path d="M6,0 L0,3 L6,6 Z" fill="#555"/>
    </marker>
  </defs>

  <text x="40" y="40" class="title">WasteGuard — Architecture du système</text>
  <text x="40" y="60" class="sub">L'application desktop Qt/C++ orchestre le matériel IoT, les services IA Python, la base Oracle et le tracking GPS.</text>

  <!-- ===================== FLUX (dessinés avant les boîtes) ===================== -->
  <!-- ESP32 <-> App -->
  <line x1="615" y1="250" x2="615" y2="360" stroke="#e74c3c" stroke-width="2.4" marker-start="url(#arrR)" marker-end="url(#arr)"/>
  <text x="625" y="290" class="wlbl" fill="#c0392b">série 9600 :</text>
  <text x="625" y="306" class="wlbl" fill="#c0392b">BTN5 · AI:&lt;MAT&gt;</text>
  <text x="625" y="322" class="wlbl" fill="#c0392b">BAC_FILL · MOTION · RFID</text>
  <!-- CAM -> App -->
  <line x1="855" y1="210" x2="770" y2="360" stroke="#e67e22" stroke-width="2.2" marker-end="url(#arr)"/>
  <text x="790" y="280" class="wlbl" fill="#ca6f1e">image</text>
  <!-- App <-> Vision -->
  <line x1="770" y1="395" x2="930" y2="372" stroke="#27ae60" stroke-width="2.2" marker-start="url(#arrR)" marker-end="url(#arr)"/>
  <text x="788" y="382" class="wlbl" fill="#1e8449">frame → matière</text>
  <!-- App <-> Voix -->
  <line x1="770" y1="430" x2="930" y2="452" stroke="#16a085" stroke-width="2.2" marker-start="url(#arrR)" marker-end="url(#arr)"/>
  <text x="792" y="424" class="wlbl" fill="#0e6655">micro / TTS</text>
  <!-- App <-> Chatbot -->
  <line x1="770" y1="470" x2="930" y2="538" stroke="#8e44ad" stroke-width="2.2" marker-start="url(#arrR)" marker-end="url(#arr)"/>
  <text x="790" y="498" class="wlbl" fill="#6c3483">question → réponse</text>
  <!-- App <-> Oracle -->
  <line x1="630" y1="520" x2="630" y2="650" stroke="#2c3e50" stroke-width="2.4" marker-start="url(#arrR)" marker-end="url(#arr)"/>
  <text x="640" y="590" class="wlbl" fill="#2c3e50">SQL (ODBC)</text>
  <!-- Chatbot -> Oracle (lecture directe) -->
  <path d="M1010 590 C 900 690, 800 690, 745 672" stroke="#8e44ad" stroke-width="2" fill="none" stroke-dasharray="6 4" marker-end="url(#arr)"/>
  <text x="850" y="700" class="wlbl" fill="#6c3483">lecture DB</text>
  <!-- App <-> tracking -->
  <line x1="470" y1="400" x2="340" y2="372" stroke="#2980b9" stroke-width="2.2" marker-start="url(#arrR)" marker-end="url(#arr)"/>
  <text x="350" y="360" class="wlbl" fill="#1f618d">lance / lit URL</text>
  <!-- App <-> map -->
  <line x1="470" y1="445" x2="340" y2="458" stroke="#2980b9" stroke-width="2.2" marker-start="url(#arrR)" marker-end="url(#arr)"/>
  <text x="350" y="478" class="wlbl" fill="#1f618d">affiche carte</text>
  <!-- App -> email -->
  <line x1="470" y1="485" x2="340" y2="548" stroke="#2c3e50" stroke-width="2.2" marker-end="url(#arr)"/>
  <text x="350" y="528" class="wlbl" fill="#2c3e50">envoi mail</text>
  <!-- tracking -> map -->
  <line x1="210" y1="410" x2="210" y2="430" stroke="#2980b9" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===================== NOEUD CENTRAL ===================== -->
  <rect x="470" y="360" width="300" height="160" rx="12" class="core"/>
  <rect x="478" y="368" width="284" height="144" rx="9" fill="none" stroke="#5b6b80" stroke-width="1"/>
  <text x="620" y="398" text-anchor="middle" class="corelbl">Application Qt / C++</text>
  <text x="620" y="424" text-anchor="middle" class="coresub">UI · CRUD 8 entités métier</text>
  <text x="620" y="446" text-anchor="middle" class="coresub">dashboards · assistant Labib</text>
  <text x="620" y="468" text-anchor="middle" class="coresub">orchestration des services</text>
  <text x="620" y="498" text-anchor="middle" class="coresub">(chef d'orchestre du système)</text>

  <!-- ===================== MATERIEL (haut) ===================== -->
  <rect x="430" y="150" width="220" height="100" rx="8" class="comp"/>
  <text x="444" y="174" class="ctitle">ESP32 (bac intelligent)</text>
  <text x="444" y="194" class="cdesc">stepper · 4 servos · RFID</text>
  <text x="444" y="211" class="cdesc">4 ultrasons · IR · OLED</text>
  <text x="444" y="228" class="cdesc">série USB 9600 bauds</text>

  <rect x="720" y="150" width="210" height="80" rx="8" class="comp"/>
  <text x="734" y="174" class="ctitle">ESP32-CAM (OV2640)</text>
  <text x="734" y="194" class="cdesc">capture la photo du déchet</text>
  <text x="734" y="211" class="cdesc">stream image → PC</text>

  <!-- ===================== IA (droite) ===================== -->
  <rect x="930" y="330" width="280" height="80" rx="8" class="comp"/>
  <text x="944" y="354" class="ctitle">IA Vision (YOLO)</text>
  <text x="944" y="374" class="cdesc">classify_*.py — ultralytics</text>
  <text x="944" y="391" class="cdesc">image → matière du déchet</text>

  <rect x="930" y="420" width="280" height="72" rx="8" class="comp"/>
  <text x="944" y="444" class="ctitle">Voix (voice_engine.py)</text>
  <text x="944" y="464" class="cdesc">reconnaissance + synthèse</text>
  <text x="944" y="481" class="cdesc">SpeechRecognition / pyttsx3</text>

  <rect x="930" y="502" width="280" height="80" rx="8" class="comp"/>
  <text x="944" y="526" class="ctitle">Chatbot Labib</text>
  <text x="944" y="546" class="cdesc">LLM Ollama (qwen2.5)</text>
  <text x="944" y="563" class="cdesc">lit Oracle en direct → langage naturel</text>

  <!-- ===================== ORACLE (bas) — cylindre ===================== -->
  <g>
    <path d="M510 660 a110 18 0 0 0 220 0 v60 a110 18 0 0 1 -220 0 z" fill="#ffffff" stroke="#2f4f4f" stroke-width="2"/>
    <ellipse cx="620" cy="660" rx="110" ry="18" fill="#ffffff" stroke="#2f4f4f" stroke-width="2"/>
    <text x="620" y="700" text-anchor="middle" class="ctitle">Base Oracle</text>
    <text x="620" y="720" text-anchor="middle" class="cdesc">via ODBC — 8 entités métier</text>
  </g>

  <!-- ===================== TRACKING / MAP / EMAIL (gauche) ===================== -->
  <rect x="90" y="330" width="250" height="80" rx="8" class="comp"/>
  <text x="104" y="354" class="ctitle">Serveur tracking (Flask)</text>
  <text x="104" y="374" class="cdesc">tracking_server.py + ngrok</text>
  <text x="104" y="391" class="cdesc">URL publique GPS</text>

  <rect x="90" y="430" width="250" height="72" rx="8" class="comp"/>
  <text x="104" y="454" class="ctitle">Carte livraison</text>
  <text x="104" y="474" class="cdesc">Qt Quick + OpenStreetMap</text>
  <text x="104" y="491" class="cdesc">MapWidget.qml</text>

  <rect x="90" y="520" width="250" height="64" rx="8" class="comp"/>
  <text x="104" y="544" class="ctitle">Notifications email</text>
  <text x="104" y="564" class="cdesc">SMTP — alertes automatiques</text>

  <!-- boucle AI note -->
  <text x="640" y="345" class="note" fill="#7f8c8d">↳ AI:&lt;MAT&gt; renvoyé à l'ESP32 (boucle de tri)</text>

  <!-- ===================== LEGENDE ===================== -->
  <rect x="90" y="640" width="380" height="180" rx="6" class="legbox"/>
  <text x="105" y="664" class="ctitle">Légende des flux</text>
  <g class="note">
    <rect x="105" y="674" width="24" height="6" fill="#e74c3c"/><text x="138" y="681">série USB (App ↔ ESP32)</text>
    <rect x="105" y="692" width="24" height="6" fill="#e67e22"/><text x="138" y="699">flux image (CAM → PC)</text>
    <rect x="105" y="710" width="24" height="6" fill="#27ae60"/><text x="138" y="717">classification IA vision (YOLO)</text>
    <rect x="105" y="728" width="24" height="6" fill="#16a085"/><text x="138" y="735">voix (reconnaissance / synthèse)</text>
    <rect x="105" y="746" width="24" height="6" fill="#8e44ad"/><text x="138" y="753">chatbot LLM + lecture Oracle</text>
    <rect x="105" y="764" width="24" height="6" fill="#2980b9"/><text x="138" y="771">tracking GPS + carte</text>
    <rect x="105" y="782" width="24" height="6" fill="#2c3e50"/><text x="138" y="789">SQL Oracle (ODBC) / email</text>
  </g>

  <!-- ===================== IDEE CLE ===================== -->
  <rect x="830" y="640" width="380" height="180" rx="6" class="legbox"/>
  <text x="845" y="664" class="ctitle">Idée clé</text>
  <g class="note">
    <text x="845" y="688">L'application Qt est le chef d'orchestre :</text>
    <text x="845" y="708">• parle à l'ESP32 (liaison série)</text>
    <text x="845" y="726">• délègue l'IA à des scripts Python</text>
    <text x="845" y="744">• persiste toutes les données dans Oracle</text>
    <text x="845" y="762">• expose le tracking GPS via ngrok</text>
    <text x="845" y="786">Boucle de tri : bouton → photo → YOLO → servo.</text>
  </g>
</svg>
